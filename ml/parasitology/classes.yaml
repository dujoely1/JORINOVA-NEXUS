# ============================================================================
# JORINOVA NEXUS — Stool/Urine Parasitology (O&P) unified class map
# ============================================================================
# Recommended YOLO detection classes for the `parasitology` model. Class NAMES
# here match the keys in backend/ai_services/parasitology_organisms.json, so every
# detected ovum/cyst resolves to its disease + significance in the app.
#
# The 11 core classes are the Chula-ParasiteEgg-11 set (stool ova). The extra
# ones (schistosoma, protozoa) are ready in the disorder map for when you add a
# urine-schistosomiasis or protozoa dataset — no code change needed.
# ============================================================================

# --- Chula-ParasiteEgg-11 (stool helminth ova) ---
stool_helminth_eggs:
  - ascaris_lumbricoides      # Ascariasis (roundworm)
  - trichuris_trichiura       # Trichuriasis (whipworm)
  - hookworm                  # Hookworm disease -> iron-deficiency anaemia
  - enterobius_vermicularis   # Enterobiasis (pinworm)
  - hymenolepis_nana          # Hymenolepiasis (dwarf tapeworm)
  - hymenolepis_diminuta      # Hymenolepiasis (rat tapeworm)
  - taenia                    # Taeniasis -> cysticercosis risk (T. solium)
  - opisthorchis_viverrini    # Opisthorchiasis -> cholangiocarcinoma risk
  - fasciolopsis_buski        # Fasciolopsiasis (giant intestinal fluke)
  - paragonimus               # Paragonimiasis (lung fluke) - mimics TB
  - capillaria_philippinensis # Intestinal capillariasis (can be fatal)

# --- Urine parasite (add a schistosomiasis dataset to enable) ---
urine:
  - schistosoma_haematobium   # Urinary schistosomiasis (bilharzia) -> bladder cancer risk

# --- Extras already in the disorder map (add datasets to enable) ---
extra:
  - schistosoma_mansoni       # Intestinal/hepatic schistosomiasis
  - entamoeba_histolytica     # Amoebiasis -> liver abscess
  - giardia_lamblia           # Giardiasis
  - clonorchis_sinensis       # Clonorchiasis (liver fluke)
