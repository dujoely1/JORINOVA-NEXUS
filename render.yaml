# ════════════════════════════════════════════════════════════════════════════
# JORINOVA NEXUS ALIS-X — Render Blueprint (free tier)
# ════════════════════════════════════════════════════════════════════════════
# One-click deploy of the FULL system to https://render.com — always-on,
# independent of any local machine (survives your PC being off; the backend
# auto-starts and auto-restarts in the cloud).
#
#   • jorinova-nexus-db   PostgreSQL (managed, data persists)
#   • jorinova-nexus-api  FastAPI backend (Docker — has poppler/libpq for PDF+OCR)
#   • jorinova-nexus-web  Next.js frontend (proxies /api/* to the backend)
#
# HOW TO DEPLOY (≈5 min, see deploy/RENDER_DEPLOY.md for screenshots):
#   1. Push this repo to GitHub (branch with this file).
#   2. render.com → New → Blueprint → pick this repo → Apply.
#   3. When prompted, set ADMIN_PASSWORD (your super-admin login password).
#   4. Wait for all three to go green → open the jorinova-nexus-web URL.
#
# NOTE ON URLS: the web service bakes the backend URL at build time. This file
# assumes the API gets https://jorinova-nexus-api.onrender.com. If Render adds a
# suffix (name already taken), update BACKEND_INTERNAL_URL on the web service and
# redeploy it. Free Postgres on Render expires ~30 days after creation — fine as
# a free pilot; move to Google Cloud (deploy/gcloud_vm.sh) for permanent paid use.
# ════════════════════════════════════════════════════════════════════════════

databases:
  - name: jorinova-nexus-db
    databaseName: alis_x
    user: alis_x_user
    plan: free
    region: frankfurt

services:
  # ── Backend API (Docker: bundles poppler + libpq for PDF/OCR) ──────────────
  - type: web
    name: jorinova-nexus-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    # Bind to Render's assigned $PORT (the Dockerfile CMD hardcodes 8000).
    # uvicorn is always present (gunicorn lives only in requirements-prod.txt);
    # 1 worker keeps memory within the free 512 MB.
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true            # strong random key, persisted across deploys
      - key: ADMIN_PASSWORD
        sync: false                    # YOU set this at deploy → super-admin "admin" login
      # Admin contact email — auto-applied to the "admin" account on startup
      # (no manual DB edit). Password reset / notifications go here.
      - key: ADMIN_EMAIL
        value: "dujoely1@gmail.com"
      # Break-glass: set a value to reset the admin password on next deploy, then
      # clear it. Lets you recover login without email codes or a direct DB edit.
      - key: ADMIN_RESET_PASSWORD
        sync: false
      # FORCE_2FA=false → login is email/username + password only (no 2FA code).
      - key: FORCE_2FA
        value: "false"
      # PostgreSQL connection string (the app reads DATABASE_URL directly).
      # Use a PERMANENT free database: paste your NEON connection string here at
      # blueprint Sync (or in the service Environment). sync:false = you set it,
      # it is NOT stored in the repo. Format:
      #   postgresql://user:password@ep-xxx.region.aws.neon.tech/dbname?sslmode=require
      # (Leaving it empty falls back to ephemeral SQLite, so always set it.)
      - key: DATABASE_URL
        sync: false
      # CORS origins (web uses same-origin proxy, so this mainly matters for the
      # mobile app / direct API calls). Adjust if your web URL differs.
      - key: ALLOWED_HOSTS
        value: "https://jorinova-nexus-web.onrender.com"
      # Public web URL — used to build the login link in staff-credential SMS.
      - key: PUBLIC_APP_URL
        value: "https://jorinova-nexus-web.onrender.com"
      # Persistent image storage for profile photos (so they survive redeploys).
      # Paste your Cloudinary URL: cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
      # Max profile-photo upload size in MB (configurable).
      - key: MAX_UPLOAD_MB
        value: "5"
      # ── Optional delivery (leave unset to keep SMS/email queued only) ────────
      - key: SMS_PROVIDER
        sync: false
      - key: PINDO_API_TOKEN
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      # SMTP (Gmail) — host/user/port are not secret, so they auto-apply. Only the
      # Gmail App Password is sync:false (you paste it at Sync). Enables real email:
      # license keys, forgot-password codes, staff credentials, install summary.
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: "dujoely1@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      # ── Cloud AI: Claude vision + LLM enrichment (optional) ──────────────────
      # Powers image analysis (blood smears, X-ray, histology) and result
      # interpretation via Claude. This is what runs on the FREE tier — no torch,
      # no GPU. Leave unset to stay fully offline. sync:false = you paste the key
      # at Sync; it is NOT stored in the repo.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Text LLM model (cheap). Vision uses VISION_MODEL below.
      - key: CLAUDE_MODEL
        value: "claude-haiku-4-5-20251001"
      # Vision model — stronger, medical image reads need it. Lower to
      # claude-haiku-4-5-20251001 to cut cost.
      - key: VISION_MODEL
        value: "claude-opus-4-8"
      # ── Local trained detector (YOLOv8 malaria/parasitology .pt) ─────────────
      # OFF by default: torch needs ~1 GB RAM and OOM-kills the free 512 MB
      # instance. To enable, upgrade this service to Standard (>=2 GB) AND set
      # INSTALL_ML=1 (the Dockerfile then installs requirements-ml.txt). With it
      # off, image analysis still works via Claude vision above.
      - key: INSTALL_ML
        value: "0"

  # ── Frontend (native Node so build-time env bakes the rewrite target) ──────
  - type: web
    name: jorinova-nexus-web
    runtime: node
    plan: free
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Empty → the browser uses relative /api/*, which next.config.ts proxies to
      # BACKEND_INTERNAL_URL (so there are NO CORS issues; same-origin only).
      - key: NEXT_PUBLIC_API_URL
        value: ""
      # The backend the Next server proxies /api/* and /media/* to. Baked at
      # build by next.config.ts rewrites(). Must match the API service URL above.
      - key: BACKEND_INTERNAL_URL
        value: "https://jorinova-nexus-api.onrender.com"
